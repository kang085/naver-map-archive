name: Naver Map Daily Archive

on:
  schedule:
    # 1. 한국 시간 오후 5시 (17:00 KST) 실행
    - cron: '0 8 * * *'
    # 2. 한국 시간 오전 5시 (05:00 KST) 실행
    - cron: '0 20 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 코드 가져오기
      uses: actions/checkout@v4

    - name: 🐍 파이썬 환경 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 📦 라이브러리 설치
      run: |
        # 💡 인터넷이 불안정할 때를 대비해 타임아웃 시간을 늘리고, 실패 시 최대 5번까지 자동 재시도하는 옵션을 추가합니다.
        pip install --default-timeout=100 --retries 5 pandas selenium webdriver-manager

    - name: 🚀 크롤러 실행 (최대 2개 검색어)
      run: python naver_crawler_every_v6.py

    - name: 💾 모든 결과물 안전하게 저장 (Commit & Push)
      if: always()  # 💡 [추가됨] 파이썬이 중간에 터져도 이 단계는 무조건 실행하여 잔여 데이터를 구조합니다!
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # 변경된 검색어.csv, progress_poi.json, 산출물 csv 모두 추적
        git add .
        
        if ! git diff --cached --quiet; then
          git commit -m "Auto-update: 크롤링 완료 또는 강제 종료 전 잔여 데이터 저장"
          # 💡 [핵심 추가] 충돌 방지를 위한 최신 상태 동기화
          git pull --rebase
          git push
        else
          echo "저장할 변경사항이 없습니다. (파이썬 내부에서 이미 모두 저장되었을 수 있습니다.)"
        fi
